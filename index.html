<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lily Magic Celebration</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff5f8; font-family: 'Poppins', sans-serif; touch-action: none; }
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; z-index: 10; }
        
        /* --- KARTU UTAMA PADUKA (SUDAH DIPERRAMPING & DIPERJELAS) --- */
        .card { 
            background: rgba(255, 255, 255, 0.98); 
            padding: 30px; 
            border-radius: 30px; 
            box-shadow: 0 10px 40px rgba(255, 77, 109, 0.2); 
            text-align: center; 
            width: 280px; /* Lebar langsing dan estetik */
            border: 2px solid #ffcad4; 
            backdrop-filter: blur(10px); 
            transition: all 0.5s ease;
            position: relative;
        }

        /* --- SISTEM ORNAMEN KUPU-KUPU (UNCUL DI AKHIR ALUR) --- */
        .butterfly {
            position: absolute;
            width: 70px; /* Ukuran kupu-kupu */
            height: auto;
            opacity: 0;
            display: none; /* Sembunyi awalnya */
            z-index: 1;
            animation: butterflyFloat 5s ease-in-out infinite, butterflyAppear 1s ease forwards;
            pointer-events: none;
        }
        .butterfly-tl { top: -25px; left: -25px; transform: rotate(-15deg); }
        .butterfly-br { bottom: -25px; right: -25px; transform: rotate(15deg); }

        @keyframes butterflyAppear { to { opacity: 1; } }
        @keyframes butterflyFloat {
            0%, 100% { transform: translateY(0) rotate(-15deg); }
            50% { transform: translateY(-8px) rotate(-10deg); }
        }
        /* Penyesuaian float untuk kanan bawah */
        .butterfly-br { animation: butterflyFloatBR 5s ease-in-out infinite, butterflyAppear 1s ease forwards; }
        @keyframes butterflyFloatBR {
            0%, 100% { transform: translateY(0) rotate(15deg); }
            50% { transform: translateY(-8px) rotate(20deg); }
        }

        .photo-wrap { 
            width: 120px; 
            height: 120px; 
            margin: 0 auto 15px auto; 
            border-radius: 50%; 
            border: 4px solid #ff9a9e; 
            overflow: hidden; 
            display: none; 
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
            background: #fff;
            position: relative;
            z-index: 2; /* Di atas kupu-kupu */
        }
        .photo-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .photo-fallback { font-size: 60px; line-height: 120px; }

        h1 { font-family: 'Dancing Script', cursive; color: #ff4d6d; margin: 0 0 10px 0; font-size: 30px; display: none; z-index: 2; position: relative; }
        #typewriter { color: #555; font-size: 14px; min-height: 60px; margin: 20px 0; line-height: 1.6; z-index: 2; position: relative; }
        
        .btn-action { 
            background: linear-gradient(45deg, #ff4d6d, #ff8fa3); 
            color: white; border: none; padding: 15px 40px; 
            border-radius: 50px; cursor: pointer; font-weight: 700; 
            font-size: 16px; transition: transform 0.1s; 
            z-index: 10; position: relative; -webkit-tap-highlight-color: transparent; 
        }
        .btn-action:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <audio id="myAudio" preload="auto" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <canvas id="canvas"></canvas>

    <div class="container">
        <div class="card">        
            
<img src="butterflyy.png" class="butterfly butterfly-tl" id="bfTL" alt="Ornament">
<img src="butterflyy.png" class="butterfly butterfly-br" id="bfBR" alt="Ornament">

            <h1 id="mainTitle">Special for You ⚜️</h1>
            
            <div class="photo-wrap" id="photoBox">
                <img src="image.jpeg" id="fotoUtama" alt="">
                <div id="fallback" class="photo-fallback">⚜️</div>
            </div>
            
            <div id="typewriter">Pencet tombol di bawah buat ngelihat sesuatu...</div>
            <button id="nextBtn" class="btn-action">Mulai 🦋</button>
        </div>
    </div>

    <script>
        // --- KONFIGURASI PADUKA RAJA ---
        // MASUKKAN LINK DIRECT FOTO ANDA (.jpg atau .png) DI SINI! (Hamba sarankan ImgBB)
        const linkFotoPaduka = ""; 

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const nextBtn = document.getElementById('nextBtn');
        const audio = document.getElementById('myAudio');
        const textElement = document.getElementById('typewriter');
        const photoBox = document.getElementById('photoBox');
        const mainTitle = document.getElementById('mainTitle');
        const fotoUtama = document.getElementById('fotoUtama');
        const fallback = document.getElementById('fallback');
        const bfTL = document.getElementById('bfTL');
        const bfBR = document.getElementById('bfBR');
        
        let particles = [];
        let step = 0;
        const story = [
            "Hai... Ada sesuatu yang mau gue kasih tau ke lo.",
            "Sebenernya, setiap hari yang gue lewati bareng lo itu berharga banget...",
            "Makasih ya udah selalu ada dan bikin hari-hari gue jadi lebih berwarna.",
            "Semoga kejutan kecil ini bisa bikin lo senyum hari ini."
        ];

        if (linkFotoPaduka !== "") {
            fotoUtama.src = linkFotoPaduka;
            fotoUtama.onload = () => { fallback.style.display = "none"; };
            fotoUtama.onerror = () => { 
                fallback.style.display = "block";
                fotoUtama.style.display = "none";
            };
        }

        function typeWriter(text, i, fnCallback) {
            if (i < text.length) {
                textElement.innerHTML = text.substring(0, i + 1);
                setTimeout(() => typeWriter(text, i + 1, fnCallback), 150); // Kecepatan SEDANG/LAMBAT
            } else if (fnCallback) setTimeout(fnCallback, 600);
        }

        function nextStep() {
            if (step === 0) {
                audio.play().catch(e => console.log("Audio waiting"));
            }
            if (step < story.length) {
                nextBtn.style.display = "none";
                typeWriter(story[step], 0, () => { nextBtn.style.display = "inline-block"; nextBtn.innerHTML = "Lanjut ✨"; });
                step++;
            } else {
                photoBox.style.display = "block";
                mainTitle.style.display = "block";
                
                // --- MUNCULKAN KUPU-KUPU ---
                bfTL.style.display = "block";
                bfBR.style.display = "block";
                // -----------------------------
                
                textElement.innerHTML = "Makasih ya buat semuanya! Kamu berharga banget! ❤️";
                nextBtn.innerHTML = "YEAYYYYY!! 🎆";
                nextBtn.onclick = triggerYayFirework;
            }
        }

        function triggerYayFirework() {
            createExplosion(window.innerWidth/2, window.innerHeight/2);
            setTimeout(() => createExplosion(window.innerWidth/4, window.innerHeight/4), 100);
            setTimeout(() => createExplosion(window.innerWidth*3/4, window.innerHeight/4), 100);
        }

        // --- SISTEM PARTIKEL SAKTI ---
        class Particle {
            constructor(x, y, isTrail = false) {
                this.x = x; this.y = y; this.isTrail = isTrail;
                if (isTrail) {
                    this.vx = (Math.random()-0.5)*2; this.vy = (Math.random()-0.5)*2;
                    this.life = 0.5; this.decay = 0.02; this.size = 30; this.emoji = '🦋';
                } else {
                    const angle = Math.random()*Math.PI*2;
                    const force = Math.random()*8+4;
                    this.vx = Math.cos(angle)*force;
                    this.vy = Math.sin(angle)*force - 3;
                    this.life = 1; this.decay = Math.random()*0.01 + 0.005;
                    this.size = Math.random()*20+15;
                    this.emoji = ['🌸', '🌸', '🌸', '🌸', '🌸'][Math.floor(Math.random()*5)];
                }
                this.friction = 0.96;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.life;
                ctx.font = `${this.size}px serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(this.emoji, this.x, this.y); ctx.restore();
            }
            update() {
                this.vx *= this.friction; this.vy *= this.friction;
                this.vy += 0.12; this.x += this.vx; this.y += this.vy;
                this.life -= this.decay;
            }
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 35; i++) particles.push(new Particle(x, y, false));
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => { p.update(); p.draw(); if (p.life <= 0) particles.splice(i, 1); });
            requestAnimationFrame(loop);
        }

        window.addEventListener('mousemove', (e) => particles.push(new Particle(e.clientX, e.clientY, true)));
        window.addEventListener('touchmove', (e) => particles.push(new Particle(e.touches[0].clientX, e.touches[0].clientY, true)));

        nextBtn.onclick = nextStep;
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        loop();

        // Hujan background (Lily)
        setInterval(() => {
            if (particles.filter(p => !p.isBurst && p.type === 'lily').length < 20) {
                particles.push(new Particle(Math.random()*canvas.width, -30, false, 'lily'));
            }
        }, 1000);
    </script>
</body>
</html>
